name: Update Satellite Radio EPG

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours — sports schedules change (rain delays, postponements)
  workflow_dispatch:         # Allow manual trigger

jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build satellite radio EPG
        run: |
          mkdir -p lib
          python scripts/build_sports_epg.py

      - name: Commit and push if XML changed
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lib/satellite_radio_epg.xml lib/sports_schedule.json
          if git diff --staged -- lib/satellite_radio_epg.xml | grep -q .; then
            git commit -m "chore: update satellite radio EPG"
            git push
          else
            echo "Sports EPG content unchanged -- nothing to commit"
          fi

      - name: Create issue on workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh label create sports-epg --color 0075ca --description "Sports EPG build alerts" 2>/dev/null || true
          gh issue create \
            --title "Sports EPG build failed -- ${DATE}" \
            --body "## Tickarr Sports EPG build failed

          The \`update-sports-epg\` workflow failed on ${DATE}.

          **Workflow run:** ${RUN_URL}

          **Likely causes:**
          - Network error fetching schedule pages
          - Schedule page structure changed (parser needs updating)
          - Python exception in build script

          Check the run logs above. The last successfully built \`satellite_radio_epg.xml\` remains in place until fixed." \
            --label "sports-epg" || true
